services:

  - type: web

    name: face-recognition-api

    runtime: python

    plan: free

    region: oregon

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt


    startCommand: |
      uvicorn app:app --host 0.0.0.0 --port $PORT


    envVars:

      - key: PYTHON_VERSION
        value: 3.11.9

      - key: KMP_DUPLICATE_LIB_OK
        value: TRUE